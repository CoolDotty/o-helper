  <h1>O-Helper</h1>
  <p>O-Helper is a lightweight Windows tray controller for supported HP OMEN systems. It uses HP WMI BIOS calls through <code>root\wmi</code> and enables features according to detected model capabilities.</p>
  <p>See <a href="README.md">README.md</a> for project details and <a href="OMEN_FEATURE_AUDIT.md">OMEN_FEATURE_AUDIT.md</a> for the current HP feature audit.</p>
