name: Release

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build, using upstream.OHelper patch format such as v0.260.1'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Resolve release version
      shell: pwsh
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
      run: |
        $tag = $env:RELEASE_TAG.Trim()
        if ($tag -notmatch '^v?\d+\.\d+\.\d+(\.\d+)?$') {
          throw "Release tag '$tag' must be numeric and updater-compatible, for example v0.260.1."
        }

        $version = $tag.TrimStart('v')
        "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
        "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Publish
      run: |
        dotnet publish app/OHelper.sln --configuration Release --runtime win-x64 -p:PublishSingleFile=true --no-self-contained -p:AssemblyVersion=$env:RELEASE_VERSION -p:FileVersion=$env:RELEASE_VERSION -p:Version=$env:RELEASE_VERSION

    - name: Upload unsigned EXE
      id: upload-unsigned
      uses: actions/upload-artifact@v4
      with:
        path: app/bin/x64/Release/net8.0-windows/win-x64/publish/OHelper.exe

    - name: Detect signing configuration
      id: detect-signing
      shell: pwsh
      env:
        SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        SIGNPATH_ORG_ID: ${{ secrets.SIGNPATH_ORG_ID }}
        SIGNPATH_PROJECT: ${{ secrets.SIGNPATH_PROJECT }}
        SIGNPATH_POLICY: ${{ secrets.SIGNPATH_POLICY }}
      run: |
        $hasSignPath = -not [string]::IsNullOrWhiteSpace($env:SIGNPATH_API_TOKEN) `
          -and -not [string]::IsNullOrWhiteSpace($env:SIGNPATH_ORG_ID) `
          -and -not [string]::IsNullOrWhiteSpace($env:SIGNPATH_PROJECT) `
          -and -not [string]::IsNullOrWhiteSpace($env:SIGNPATH_POLICY)
        "has_signpath=$($hasSignPath.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - id: sign-exe
      if: ${{ steps.detect-signing.outputs.has_signpath == 'true' }}
      uses: signpath/github-action-submit-signing-request@v1.1
      with:
        api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
        organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
        project-slug: ${{ secrets.SIGNPATH_PROJECT }}
        signing-policy-slug: ${{ secrets.SIGNPATH_POLICY }}
        github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
        wait-for-completion: true
        output-artifact-directory: './signed'

    - name: Create ZIP from signed EXE
      if: ${{ steps.detect-signing.outputs.has_signpath == 'true' && steps.sign-exe.outcome == 'success' }}
      run: powershell Compress-Archive ./signed/OHelper.exe ./signed/OHelper.zip

    - name: Upload signed EXE and ZIP
      if: ${{ steps.detect-signing.outputs.has_signpath == 'true' && steps.sign-exe.outcome == 'success' }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "$env:RELEASE_TAG" ./signed/OHelper.exe ./signed/OHelper.zip --clobber

    - name: Create ZIP from unsigned EXE
      if: ${{ steps.detect-signing.outputs.has_signpath != 'true' }}
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ./unsigned | Out-Null
        Copy-Item app/bin/x64/Release/net8.0-windows/win-x64/publish/OHelper.exe ./unsigned/OHelper.exe -Force
        Compress-Archive ./unsigned/OHelper.exe ./unsigned/OHelper.zip -Force

    - name: Upload unsigned EXE and ZIP
      if: ${{ steps.detect-signing.outputs.has_signpath != 'true' }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "$env:RELEASE_TAG" ./unsigned/OHelper.exe ./unsigned/OHelper.zip --clobber

    - name: Generate SLSA build provenance attestation
      if: ${{ steps.detect-signing.outputs.has_signpath == 'true' && steps.sign-exe.outcome == 'success' }}
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: |
          ./signed/OHelper.exe
          ./signed/OHelper.zip

    - name: Generate unsigned build provenance attestation
      if: ${{ steps.detect-signing.outputs.has_signpath != 'true' }}
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: |
          ./unsigned/OHelper.exe
          ./unsigned/OHelper.zip
